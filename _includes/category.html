<section id="{{ include.category.id }}" class="category-section mt-8 scroll-mt-20">
  <h2 class="font-script text-3xl md:text-4xl mb-2 text-ink">
    <span data-lang="ru">{{ include.category.name.ru }}</span>
    <span data-lang="en">{{ include.category.name.en }}</span>
    {%- if include.category.size -%}
      <span class="ml-2 align-middle text-sm md:text-base text-muted font-sans font-normal tabular-nums">
        <span data-lang="ru">{{ include.category.size.ru }}</span>
        <span data-lang="en">{{ include.category.size.en }}</span>
      </span>
    {%- endif -%}
  </h2>
  <div class="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-16 md:gap-x-5 lg:gap-x-6">
    {% for item in include.category.items %}
      {% include item.html item=item %}
    {% endfor %}
  </div>
</section>
